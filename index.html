<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NILS Online Registration Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --nils-blue: #003366;
            --nils-gold: #ffcc00;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #0f172a;
            --text-sub: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            top: 0 !important;
        }

        .top-bar {
            background: #ffffff;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header {
            background: linear-gradient(-45deg, #003366, #00509d, #001a33, #003366);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            padding: 4rem 1rem 5rem;
            text-align: center;
            border-bottom: 6px solid var(--nils-gold);
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            max-width: 1300px;
            margin: auto;
            padding: 0 20px 60px;
            position: relative;
            z-index: 20;
        }

        .controls-section {
            max-width: 900px;
            margin: -40px auto 50px;
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .category-nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .cat-pill {
            padding: 10px 22px;
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .cat-pill.active {
            background: var(--nils-blue);
            color: white;
            border-color: var(--nils-blue);
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            transition: 0.4s;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .card-img-container {
            width: 100%;
            position: relative;
            background: #eee;
            cursor: zoom-in;
            overflow: hidden;
        }

        .card-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 51, 102, 0.85);
            color: white;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            z-index: 5;
        }

        .badge-tag {
            top: 45px;
            background: #ea580c;
        }

        .card-body {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--nils-blue);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .read-more-link {
            color: var(--nils-blue);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: underline;
            margin-bottom: 15px;
            display: inline-block;
        }

        .info-group {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #f1f5f9;
            font-size: 0.85rem;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            color: var(--text-sub);
        }

        .price-tag {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ea580c;
            margin: 15px 0;
        }

        .apply-btn {
            background: var(--nils-blue);
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        /* MODALS CSS FIXED FOR DESKTOP & MOBILE iFRAME VIEW */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: flex-start;
            z-index: 4000;
            overflow-y: auto;
            padding: 40px 15px;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 700px;
            border-radius: 24px;
            padding: 35px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            margin: auto;
        }

        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 26px;
            color: var(--text-sub);
            margin-bottom: 10px;
        }

        .img-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            z-index: 5000;
            padding: 60px 15px;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 35px;
            color: white;
            font-size: 55px;
            cursor: pointer;
            z-index: 5100;
            font-weight: bold;
            line-height: 1;
        }

        .img-zoom-content {
            max-width: 90%;
            max-height: none;
            border-radius: 8px;
            object-fit: contain;
            margin-top: 10px;
            margin-bottom: 40px;
        }

        footer {
            background: var(--nils-blue);
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-top: 50px;
            border-top: 5px solid var(--nils-gold);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .course-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8rem;
            }

            .modal-content {
                padding: 25px;
                width: 95%;
            }

            .img-modal-overlay {
                padding-top: 80px;
            }

            .close-btn {
                top: 20px;
                right: 20px;
                font-size: 45px;
            }

            .img-zoom-content {
                max-width: 98%;
            }
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <div id="google_translate_element"></div>
    </div>

    <header>
        <h1>NILS Online Registration</h1>
        <p>National Institute of Labour Studies</p>
    </header>

    <div class="modal-overlay" id="descModal" onclick="closeModal('descModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal('descModal')"><i class="fa-solid fa-circle-xmark"></i></span>
            <h2 id="modalTitle" style="color:var(--nils-blue); margin-bottom:15px; font-size:1.6rem;">Course Title</h2>
            <div id="modalBody"
                style="line-height:1.7; color:var(--text-sub); white-space: pre-line; font-size: 0.95rem;">
                Description...</div>
        </div>
    </div>

    <div class="img-modal-overlay" id="imgModal" onclick="closeModal('imgModal')">
        <span class="close-btn" onclick="closeModal('imgModal')">×</span>
        <img id="fullImg" class="img-zoom-content">
    </div>

    <div class="container">
        <div class="controls-section">
            <input type="text" id="searchInput" class="search-box"
                placeholder="Search for a course or date (e.g. 2026.03)..." onkeyup="applyFilters()"
                style="width:100%; padding:15px; border-radius:14px; border:1px solid #e2e8f0; outline:none;">
            <div class="category-nav" id="categoryNav">
                <div class="cat-pill active" id="pill-all" onclick="setCat('All')">All Programs</div>
            </div>
        </div>
        <div id="loader" style="text-align:center;"><i class="fa-solid fa-spinner fa-spin fa-2x"></i></div>
        <div class="course-grid" id="courseGrid"></div>
    </div>

    <footer>
        <p>© <span id="year"></span> National Institute of Labour Studies</p>
        <p>Developed by - V.P.R.L. Vidanapathirana</p>

        <div style="margin-top: 20px; opacity: 0.8;">
            <a href='https://www.counters-free.net/' style="display:none;">counter-FREE</a>
            <script type='text/javascript'
                src='https://www.freevisitorcounters.com/auth.php?id=221ab83fc2a6c6e94c9fc1d96dc2c026eee5a3ae'></script>
            <script type="text/javascript"
                src="https://www.freevisitorcounters.com/en/home/counter/1514547/t/1"></script>
        </div>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'si,ta,en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxlMiseZ5YjuzOFeNWSaJ5mqQ-EC5tWGIsFbRMGpTCBeGhiqZLLBJRI-Ch2ib6NjFEA/exec";
        let allData = [];
        let currentCat = 'All';

        document.getElementById('year').textContent = new Date().getFullYear();

        function fixImg(url) {
            if (!url) return 'https://via.placeholder.com/600x600?text=No+Image';
            if (url.includes('drive.google.com')) {
                const id = url.split('id=')[1] || url.split('/d/')[1].split('/')[0];
                return `https://lh3.googleusercontent.com/u/0/d/${id}`;
            }
            return url;
        }

        async function load() {
            try {
                const r = await fetch(API_URL);
                allData = await r.json();
                updateNav();
                applyFilters();
            } catch (e) { document.getElementById('loader').innerText = "Failed to load."; }
        }

        function updateNav() {
            const nav = document.getElementById('categoryNav');
            let cats = [];
            allData.forEach(i => {
                if (i.Category) {
                    const parts = i.Category.split(',').map(s => s.trim());
                    cats.push(...parts);
                }
            });
            const uniqueCats = [...new Set(cats)].filter(Boolean);
            uniqueCats.forEach(c => {
                const div = document.createElement('div');
                div.className = 'cat-pill';
                div.innerText = c;
                div.onclick = () => setCat(c);
                nav.appendChild(div);
            });
        }

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const today = new Date();
            const todayStr = today.getFullYear() + '.' +
                String(today.getMonth() + 1).padStart(2, '0') + '.' +
                String(today.getDate()).padStart(2, '0');

            const filtered = allData.filter(i => {
                const nameMatch = i.Name.toLowerCase().includes(q);
                const searchDateMatch = i.Date && i.Date.toLowerCase().includes(q);
                const catMatch = currentCat === 'All' || (i.Category && i.Category.includes(currentCat));

                let isPastPostFilter = true;
                if (i.Date && i.Date !== 'TBA' && i.Date.match(/^\d{4}\.\d{2}\.\d{2}$/)) {
                    isPastPostFilter = i.Date >= todayStr;
                }
                return (nameMatch || searchDateMatch) && catMatch && isPastPostFilter;
            });
            render(filtered);
        }

        function render(data) {
            document.getElementById('loader').style.display = 'none';
            const grid = document.getElementById('courseGrid');
            grid.innerHTML = data.map(item => {
                const cats = item.Category ? item.Category.split(',').map(s => s.trim()) : [];
                let badgeHTML = `<span class="badge">${cats[0] || ''}</span>`;
                if (cats[1]) badgeHTML += `<span class="badge badge-tag">${cats[1]}</span>`;

                const rawDesc = item.Description || "";
                const isLong = rawDesc.length > 100;
                const shortDesc = isLong ? rawDesc.substring(0, 100) + "..." : rawDesc;
                const priceDisp = String(item.Price).toLowerCase() === 'free' ? 'FREE' : 'LKR ' + Number(item.Price).toLocaleString();
                const imgSrc = fixImg(item.Image_URL);

                return `
                <div class="card">
                    <div class="card-img-container" onclick="openImg('${imgSrc}')">
                        ${badgeHTML}
                        <img src="${imgSrc}" class="card-img" loading="lazy" onerror="this.src='https://via.placeholder.com/600x600?text=No+Image'">
                    </div>
                    <div class="card-body">
                        <h3>${item.Name}</h3>
                        <p class="card-desc">${shortDesc}</p>
                        ${isLong ? `<span class="read-more-link" onclick="openDesc('${item.Name.replace(/'/g, "\\'")}', '${rawDesc.replace(/\n/g, '<br>').replace(/'/g, "\\")}')">Read More</span>` : ""}
                        <div class="info-group">
                            <div class="info-row"><i class="fa-regular fa-calendar"></i> ${item.Date || 'TBA'}</div>
                            <div class="info-row"><i class="fa-solid fa-location-dot"></i> ${item.Location || 'NILS'}</div>
                        </div>
                        <div class="price-tag">${priceDisp}</div>
                        <a href="${item.Apply_Link || '#'}" target="_blank" class="apply-btn">Register Now</a>
                    </div>
                </div>`;
            }).join('');
        }

        function setCat(c) {
            currentCat = c;
            document.querySelectorAll('.cat-pill').forEach(p => {
                if (c === 'All') { p.classList.toggle('active', p.innerText === 'All Programs'); }
                else { p.classList.toggle('active', p.innerText === c); }
            });
            applyFilters();
        }

        function openDesc(title, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerHTML = desc;
            document.getElementById('descModal').style.display = 'flex';
            document.getElementById('descModal').scrollTop = 0;
            document.body.style.overflow = 'hidden';
        }

        function openImg(src) {
            document.getElementById('fullImg').src = src;
            document.getElementById('imgModal').style.display = 'flex';
            document.getElementById('imgModal').scrollTop = 0;
            document.body.style.overflow = 'hidden';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        load();
    </script>
</body>

</html>
